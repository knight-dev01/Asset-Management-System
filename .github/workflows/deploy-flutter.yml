name: Deploy Flutter to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: 'stable'
    
    - name: Get dependencies
      run: |
        cd flutter_app
        flutter pub get
    
    - name: Build web
      run: |
        cd flutter_app
        flutter build web --release --dart-define=ASSET_API_URL=https://asset-management-system-api.onrender.com/api
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./flutter_app/build/web
        cname: knight-dev01.github.io
