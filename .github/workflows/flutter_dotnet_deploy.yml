name: Flutter and .NET Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Flutter
        run: |
          sudo apt-get update
          sudo apt-get install -y curl unzip xz-utils
          FLUTTER_VERSION=3.44.5
          curl -L https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${FLUTTER_VERSION}-stable.tar.xz -o flutter.tar.xz
          sudo tar xf flutter.tar.xz -C /opt
          sudo ln -sf /opt/flutter/bin/flutter /usr/local/bin/flutter
          flutter --version

      - name: Get Flutter dependencies
        run: |
          cd flutter_app
          flutter pub get

      - name: Build Flutter web
        run: |
          cd flutter_app
          flutter build web --release

      - name: Build .NET backend
        run: |
          cd backend/AssetManagement.Api
          dotnet build --configuration Release

      - name: Upload Flutter web artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: flutter_app/build/web
