services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5238:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - asset-network

  frontend:
    build:
      context: ./flutter_app
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - asset-network

networks:
  asset-network:
    driver: bridge
